services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: disclaw-bot
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - NODE_ENV=production
    volumes:
      # Persist config and memory data
      - disclaw-config:/home/disclaw/.disclaw
      - disclaw-data:/app/data

volumes:
  disclaw-config:
  disclaw-data:
